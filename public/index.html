<!DOCTYPE html>
<html>
<head>
    <title>Hospital</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #f0f7f4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
            border: 1px solid #d4edda;
        }
        .logo {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #1a7a3c;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h2 { font-size: 22px; color: #1a7a3c; }
        .header p { font-size: 14px; color: #888; margin-top: 4px; }
        .campo { margin-bottom: 1rem; }
        label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #d0d7de;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: #1a7a3c; }
        button {
            width: 100%;
            padding: 11px;
            background: #1a7a3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover { background: #15612f; }
        .footer { text-align: center; font-size: 12px; color: #aaa; margin-top: 1.2rem; }
        .error {
            background: #fee2e2;
            color: #b91c1c;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                     stroke="white" stroke-width="2" stroke-linecap="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
            </div>
            <h2>Hospital</h2>
            <p>Sistema de acceso</p>
        </div>

        <div class="error" id="error-msg">Usuario o contraseña incorrectos</div>

        <div class="campo">
            <label for="nombreUsuario">Usuario</label>
            <input type="text" id="nombreUsuario" placeholder="Ingresa tu usuario" required>
        </div>
        <div class="campo">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" placeholder="Ingresa tu contraseña" required>
        </div>
        <button onclick="iniciarSesion()">Iniciar sesión</button>

        <p class="footer">Sistema Hospitalario &copy; 2025</p>
    </div>

    <script>
        async function iniciarSesion() {
            const nombreUsuario = document.getElementById('nombreUsuario').value;
            const contrasena = document.getElementById('contrasena').value;
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            const cuerpo = new URLSearchParams({ nombreUsuario, contrasena });
            const respuesta = await fetch('/login', { method: 'POST', body: cuerpo });
            const datos = await respuesta.json();

            if (datos.redirigir) {
                window.location.href = datos.redirigir;
            } else {
                errorMsg.style.display = 'block';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') iniciarSesion();
        });
    </script>
</body>
</html>
